<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Basic page settings -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberSafe Trainer - Training</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header>
        <div class="logo">CyberSafe Trainer</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="training.html" class="active-link">Training</a>
            <a href="tips.html">Tips</a>
        </nav>
    </header>

    <!-- Page title -->
    <section class="page-title">
        <h1>Phishing Training Demo</h1>
        <p>
            Read each scenario carefully and choose the safest response.
        </p>
    </section>

    <!-- Score box -->
    <section class="section score-box">
        <h2>Your Score: <span id="score">0</span></h2>
        <p>
            Scenario <span id="question-number">1</span> of
            <span id="total-questions">3</span>
        </p>
    </section>

    <!-- Scenario area -->
    <section class="email-box">
        <div class="email-header">
            <p><strong>From:</strong> <span id="sender"></span></p>
            <p><strong>Subject:</strong> <span id="subject"></span></p>
        </div>

        <div class="email-body">
            <p id="message"></p>
            <p>
                <a href="#" class="fake-link" id="link-text"></a>
            </p>
        </div>
    </section>

    <!-- Buttons -->
    <section class="section">
        <h2>What would you do?</h2>

        <div class="button-group">
            <button class="btn red-btn" onclick="checkAnswer('click')">Click the Link</button>
            <button class="btn green-btn" onclick="checkAnswer('report')">Report Phishing</button>
            <button class="btn gray-btn" onclick="checkAnswer('ignore')">Ignore Message</button>
        </div>
    </section>

    <!-- Feedback -->
    <section class="section feedback-box">
        <h2>Feedback</h2>
        <p id="feedback-text">Choose an answer to see feedback.</p>

        <button class="btn" id="next-btn" onclick="nextQuestion()" style="display: none;">
            Next Scenario
        </button>
    </section>

    <footer>
        <p>&copy; 2026 CyberSafe Trainer | Student Project Demo</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
